<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Not Found</title>
  </head>
  <body>
    <script>
      // GitHub Pages (project pages) fallback:
      // Redirect unknown paths to the SPA entry with the original path encoded.
      // The app uses HashRouter, so this is mostly a safety net.
      var path = location.pathname + location.search + location.hash;
      location.replace("./#/404?from=" + encodeURIComponent(path));
    </script>
  </body>
</html>
